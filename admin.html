<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Console Admin BE — Provost</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2d4b8c;--blue-dark:#1a2f5e;--blue-mid:#3a5ca8;
  --blue-light:rgba(45,75,140,0.08);--blue-lighter:rgba(45,75,140,0.04);
  --yellow:#fab423;--yellow-bg:rgba(250,180,35,0.13);
  --dark:#1e2638;--text:#3a4255;--text-light:#8a93a8;
  --border:#e4e8f0;--white:#fff;--bg:#f5f7fb;
  --green:#2a7d52;--green-bg:rgba(42,125,82,0.09);
  --red:#c0392b;--red-bg:rgba(192,57,43,0.09);
  --radius:12px;--radius-sm:8px;
  --shadow:0 4px 20px rgba(35,45,70,0.06);
  --shadow-lg:0 12px 40px rgba(35,45,70,0.12);
  --tr:all 0.25s ease;
}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;padding:20px;min-height:100vh}
.admin-header{max-width:1200px;margin:0 auto 20px;display:flex;align-items:center;justify-content:between;border-bottom:2px solid var(--border);padding-bottom:15px}
.admin-layout{display:grid;grid-template-columns:280px 1fr;gap:24px;max-width:1200px;margin:0 auto}
.sidebar{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);height:fit-content}
.nav-title{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);margin-bottom:12px;padding-left:8px}
.nav-btn{width:100%;padding:11px 14px;background:transparent;border:none;border-radius:var(--radius-sm);text-align:left;font-family:'Be Vietnam Pro',sans-serif;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;transition:var(--tr);margin-bottom:4px;display:flex;align-items:center;justify-content:between}
.nav-btn:hover{background:var(--blue-light);color:var(--blue)}
.nav-btn.active{background:var(--blue);color:var(--white);box-shadow:0 4px 12px rgba(45,75,140,0.2)}
.main-content{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:12px}
.q-admin-list{display:flex;flex-direction:column;gap:12px}
.q-admin-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;background:var(--bg);transition:var(--tr);display:flex;align-items:center;justify-content:space-between;gap:16px}
.q-admin-card:hover{border-color:var(--blue-mid);background:var(--white);box-shadow:var(--shadow)}
.q-info-block{flex:1}
.q-admin-label{font-weight:700;color:var(--dark);font-size:14px;margin-bottom:4px}
.q-admin-meta{display:flex;gap:12px;align-items:center}
.q-badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:var(--blue-light);color:var(--blue)}
.q-has-img{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:var(--yellow-bg);color:#7a5500}
.action-cluster{display:flex;gap:6px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:40px;border:none;font-family:'Be Vietnam Pro',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:var(--tr)}
.btn-primary{background:var(--blue);color:var(--white)}
.btn-primary:hover{background:var(--blue-dark);box-shadow:0 4px 14px rgba(45,75,140,.25)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.btn-danger{background:transparent;border:1px solid var(--border);color:var(--red)}
.btn-danger:hover{background:var(--red-bg);border-color:var(--red)}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:40px}
.modal-overlay{position:fixed;inset:0;background:rgba(30,38,56,0.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:9999}
.modal-overlay.active{display:flex}
.modal-card{background:var(--white);border-radius:var(--radius);padding:24px;width:500px;box-shadow:var(--shadow-lg);position:relative;animation:pop .25s ease-out}
@keyframes pop{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.modal-title{font-size:16px;font-weight:900;color:var(--dark);margin-bottom:16px;text-transform:uppercase;letter-spacing:0.5px}
.frow{margin-bottom:14px}
.flabel{display:block;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--blue);margin-bottom:6px}
.finput,.fselect,.ftextarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Be Vietnam Pro',sans-serif;font-size:13px;color:var(--dark);outline:none;transition:var(--tr)}
.finput:focus,.fselect:focus,.ftextarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(45,75,140,.1)}
.ftextarea{min-height:70px;resize:vertical}
.toast{position:fixed;bottom:20px;right:20px;background:var(--dark);color:var(--white);padding:11px 18px;border-radius:var(--radius);font-size:12px;font-weight:500;box-shadow:var(--shadow-lg);z-index:99999;display:flex;align-items:center;gap:9px;transform:translateY(70px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-left:4px solid var(--green)}
.toast.err{border-left:4px solid var(--red)}
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg, #1a2f5e 0%, #2d4b8c 100%);display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column}
.login-card{background:var(--white);border-radius:16px;padding:40px;width:400px;box-shadow:var(--shadow-lg);text-align:center;position:relative;overflow:hidden}
.login-logo{font-size:26px;font-weight:900;color:var(--blue);margin-bottom:6px;letter-spacing:-0.5px}
.login-sub{font-size:12px;color:var(--text-light);margin-bottom:30px;font-weight:500}
.login-bar{width:100%;height:5px;background:var(--yellow);position:absolute;top:0;left:0}
.app-wrap{display:none} .app-wrap.visible{display:block}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-bar"></div>
    <div class="login-logo">PROVOST</div>
    <div class="login-sub">Console d'Administration — Configuration Formulaires</div>
    <div id="g_id_onload" data-client_id="17936036373-bnj5d6ljm975rmpqu6sdb87819bdv6bc.apps.googleusercontent.com" data-context="signin" data-ux_mode="popup" data-callback="handleCredentialResponse" data-auto_select="false" data-itp_support="true"></div>
    <div style="display: flex; justify-content: center;"><div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large"></div></div>
    <div id="login-err" style="color:var(--red); font-size:12px; margin-top:10px; display:none"></div>
  </div>
</div>

<div class="app-wrap" id="app-wrap">
  <header class="admin-header">
    <div>
      <h1 style="font-size:20px; font-weight:900; color:var(--dark); letter-spacing:-0.5px;">PROVOST — Console Formulaires</h1>
      <p style="font-size:12px; color:var(--text-light)">Configurez en temps réel les questions et schémas du portail commercial</p>
    </div>
    <button class="btn btn-primary" onclick="sauvegarderConfigurationGlobale()">💾 Enregistrer sur Google Sheets</button>
  </header>

  <div class="admin-layout">
    <aside class="sidebar">
      <div class="nav-title">Sections Générales</div>
      <button class="nav-btn active" data-sec="infos_generales" onclick="switchSection('infos_generales')">📋 Infos générales</button>
      <div class="nav-title" style="margin-top:15px;">Diagnostics Produits</div>
      <button class="nav-btn" data-sec="proplus_lp3" onclick="switchSection('proplus_lp3')">📦 Proplus LP3</button>
      <button class="nav-btn" data-sec="proplus_lp3_2n" onclick="switchSection('proplus_lp3_2n')">🏢 Proplus LP3 - 2 Niv.</button>
      <button class="nav-btn" data-sec="install_ext" onclick="switchSection('install_ext')">🌤️ Installation Ext.</button>
    </aside>

    <main class="main-content">
      <div class="section-head">
        <h2 id="current-section-title" style="font-size:16px; font-weight:900; color:var(--dark); text-transform:uppercase; letter-spacing:0.5px;">Infos générales</h2>
        <button class="btn btn-outline btn-sm" onclick="ouvrirModaleQuestion(null)">➕ Ajouter une question</button>
      </div>
      <div class="q-admin-list" id="q-admin-list"></div>
    </main>
  </div>
</div>

<!-- 🛠️ WINDOW MODAL : Éditeur de question complet conforme Google Form -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-card">
    <div class="modal-title" id="modal-title-text">Nouvelle Question</div>
    <input type="hidden" id="m-index">
    <div class="frow">
      <label class="flabel">ID de la question (Unique, sans espace ni accent)</label>
      <input type="text" id="m-id" class="finput" placeholder="ex: hauteur_sous_poutre">
    </div>
    <div class="frow">
      <label class="flabel">Intitulé de la question (Label visible)</label>
      <input type="text" id="m-label" class="finput" placeholder="ex: Quelle est la hauteur disponible (mm) ?">
    </div>
    <div class="frow">
      <label class="flabel">Typologie de réponse (Type Google Form)</label>
      <!-- 🆕 INTEGRATION DES TYPOLOGIES COMPLÈTES GOOGLE FORMS -->
      <select id="m-type" class="fselect" onchange="toggleOptionsSection()">
        <option value="text">Texte court (Réponse courte)</option>
        <option value="textarea">Zone texte (Paragraphe)</option>
        <option value="dropdown">Choix dans une liste (Menu déroulant) 🆕</option>
        <option value="scale">Échelle linéaire de 1 à 5 (Évaluation) 🆕</option>
        <option value="radio">Choix unique (Bouton radio)</option>
        <option value="checkbox">Choix multiples (Cases à cocher)</option>
      </select>
    </div>
    <div class="frow" id="m-opts-row" style="display:none;">
      <label class="flabel">Options de réponse (Une option par ligne)</label>
      <textarea id="m-options" class="ftextarea" placeholder="Option 1&#10;Option 2&#10;Option 3"></textarea>
    </div>
    <div class="frow">
      <label class="flabel">URL de l'image illustrative (Schéma technique du BE / Facultatif)</label>
      <input type="text" id="m-image" class="finput" placeholder="https://url-de-mon-image.png">
    </div>
    <div class="frow" id="m-holder-row">
      <label class="flabel">Placeholder (Texte indicatif en arrière-plan / Facultatif)</label>
      <input type="text" id="m-placeholder" class="finput" placeholder="ex: Saisir une valeur...">
    </div>
    <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:20px;">
      <button class="btn btn-outline" onclick="fermerModale()">Annuler</button>
      <button class="btn btn-primary" onclick="sauvegarderQuestionFormulaire()">Valider la question</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-msg"></span></div>

<script>
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzgO6wk3Jdu6XBDBCI6Fa5lBJItvQuhm_oM_bmY_XBt98n0DpZ1McWdCyxXwW96l_2k/exec';
var currentSection = 'infos_generales';
var configDatabase = { infos_generales: [], proplus_lp3: [], proplus_lp3_2n: [], install_ext: [] };

function jwtDecode(token) { try { var b64Url = token.split('.')[1]; var b64 = b64Url.replace(/-/g, '+').replace(/_/g, '/'); return JSON.parse(decodeURIComponent(window.atob(b64).split('').map(function(c) { return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2); }).join(''))); } catch (e) { return {}; } }

window.addEventListener('DOMContentLoaded', function() {
  if (sessionStorage.getItem('portail_admin_auth') === '1') {
    activerConsoleAdmin();
  }
});

function handleCredentialResponse(response) {
  var payload = jwtDecode(response.credential);
  if (payload.email && payload.email.endsWith('@provost.fr')) {
    sessionStorage.setItem('portail_admin_auth', '1');
    activerConsoleAdmin();
  } else {
    var errEl = document.getElementById('login-err');
    errEl.textContent = "Accès refusé. Utilisez votre compte pro @provost.fr";
    errEl.style.display = 'block';
  }
}

function activerConsoleAdmin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-wrap').classList.add('visible');
  chargerConfigurationDepuisSheets();
}

function chargerConfigurationDepuisSheets() {
  toast("⏳ Synchronisation de la configuration...", "ok");
  fetch(APPS_SCRIPT_URL + '?action=getFormulaire&_=' + Date.now())
  .then(function(r) { return r.json(); })
  .then(function(res) {
    if (res && res.success && res.formData) {
      configDatabase = res.formData;
      // Sécurité si un onglet est manquant dans l'objet de base
      ['infos_generales', 'proplus_lp3', 'proplus_lp3_2n', 'install_ext'].forEach(function(k) {
        if (!configDatabase[k]) configDatabase[k] = [];
      });
      renderListQuestions();
      toast("⚙️ Configuration chargée avec succès.", "ok");
    } else {
      toast("⚠️ Base vide, initialisation d'un modèle vierge.", "ok");
    }
  }).catch(function(err) {
    console.error(err);
    toast("❌ Erreur de liaison réseau backend.", "err");
  });
}

function switchSection(secId) {
  currentSection = secId;
  document.querySelectorAll('.sidebar .nav-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('.sidebar .nav-btn[data-sec="' + secId + '"]').classList.add('active');
  
  var titleMap = { infos_generales: "Infos générales", proplus_lp3: "Proplus LP3", proplus_lp3_2n: "Proplus LP3 - 2 Niveaux", install_ext: "Installation extérieure" };
  document.getElementById('current-section-title').textContent = titleMap[secId] || secId;
  renderListQuestions();
}

// ── 🛠️ ALIGNEMENT LIBELLÉS TYPOLOGIE GOOGLE FORMS ──
function getLabelTypeForm(t) {
  return {
    text: '📝 Texte court',
    textarea: '📄 Paragraphe',
    dropdown: '🔽 Menu déroulant 🆕',
    scale: '📊 Échelle linéaire (1-5) 🆕',
    radio: '🔘 Choix unique',
    checkbox: '☑️ Choix multiples'
  }[t] || t;
}

function renderListQuestions() {
  var listContainer = document.getElementById('q-admin-list');
  if (!listContainer) return;
  listContainer.innerHTML = '';
  
  var list = configDatabase[currentSection] || [];
  if (!list.length) {
    listContainer.innerHTML = '<div style="text-align:center; padding:30px; color:var(--text-light); font-style:italic;">Aucune question spécifique configurée pour cette section.</div>';
    return;
  }
  
  list.forEach(function(q, index) {
    var card = document.createElement('div');
    card.className = 'q-admin-card';
    
    var badgeImg = q.image ? '<span class="q-has-img">🖼️ Schéma lié</span>' : '';
    
    card.innerHTML = '<div class="q-info-block">' +
      '<div class="q-admin-label">' + q.label + ' <span style="font-family:monospace; font-size:11px; color:var(--text-light); font-weight:normal;">[' + q.id + ']</span></div>' +
      '<div class="q-admin-meta">' +
        '<span class="q-badge">' + getLabelTypeForm(q.type) + '</span>' +
        badgeImg +
      '</div>' +
    '</div>' +
    '<div class="action-cluster">' +
      '<button class="btn btn-outline btn-sm" onclick="trierPositionQuestion(' + index + ', -1)">▲</button>' +
      '<button class="btn btn-outline btn-sm" onclick="trierPositionQuestion(' + index + ', 1)">▼</button>' +
      '<button class="btn btn-outline btn-sm" style="color:var(--blue)" onclick="ouvrirModaleQuestion(' + index + ')">✏️ Modifier</button>' +
      '<button class="btn btn-danger btn-sm" onclick="supprimerQuestionFormulaire(' + index + ')">🗑️</button>' +
    '</div>';
    
    listContainer.appendChild(card);
  });
}

function toggleOptionsSection() {
  var t = document.getElementById('m-type').value;
  var rowOpts = document.getElementById('m-opts-row');
  var rowHolder = document.getElementById('m-holder-row');
  
  // Affiche le bloc d'options uniquement pour les types à choix multiples ou dropdown
  if (t === 'radio' || t === 'checkbox' || t === 'dropdown') {
    rowOpts.style.display = 'block';
  } else {
    rowOpts.style.display = 'none';
  }
  
  // Cache le placeholder pour le type scale et les sélections graphiques
  if (t === 'text' || t === 'textarea') {
    rowHolder.style.display = 'block';
  } else {
    rowHolder.style.display = 'none';
  }
}

function ouvrirModaleQuestion(index) {
  document.getElementById('modal-overlay').classList.add('active');
  if (index !== null) {
    document.getElementById('modal-title-text').textContent = "Modifier la question";
    var q = configDatabase[currentSection][index];
    document.getElementById('m-index').value = index;
    document.getElementById('m-id').value = q.id || '';
    document.getElementById('m-label').value = q.label || '';
    document.getElementById('m-type').value = q.type || 'text';
    document.getElementById('m-options').value = (q.options || []).join('\n');
    document.getElementById('m-image').value = q.image || '';
    document.getElementById('m-placeholder').value = q.placeholder || '';
  } else {
    document.getElementById('modal-title-text').textContent = "Nouvelle Question";
    document.getElementById('m-index').value = '';
    document.getElementById('m-id').value = '';
    document.getElementById('m-label').value = '';
    document.getElementById('m-type').value = 'text';
    document.getElementById('m-options').value = '';
    document.getElementById('m-image').value = '';
    document.getElementById('m-placeholder').value = '';
  }
  toggleOptionsSection();
}

function fermerModale() {
  document.getElementById('modal-overlay').classList.remove('active');
}

function sauvegarderQuestionFormulaire() {
  var idx = document.getElementById('m-index').value;
  var qId = document.getElementById('m-id').value.trim().replace(/[^a-zA-Z0-9_]/g, '');
  var qLabel = document.getElementById('m-label').value.trim();
  var qType = document.getElementById('m-type').value;
  var qImg = document.getElementById('m-image').value.trim();
  var qHolder = document.getElementById('m-placeholder').value.trim();
  
  if (!qId || !qLabel) { alert("L'ID et l'Intitulé sont obligatoires."); return; }
  
  var rawOptions = document.getElementById('m-options').value.split('\n');
  var cleanOptions = [];
  rawOptions.forEach(function(o) { if(o.trim() !== "") cleanOptions.push(o.trim()); });
  
  var qObject = { id: qId, label: qLabel, type: qType };
  if (cleanOptions.length && (qType === 'radio' || qType === 'checkbox' || qType === 'dropdown')) qObject.options = cleanOptions;
  if (qImg) qObject.image = qImg;
  if (qHolder && (qType === 'text' || qType === 'textarea')) qObject.placeholder = qHolder;
  
  if (idx !== "") {
    configDatabase[currentSection][idx] = qObject;
  } else {
    configDatabase[currentSection].push(qObject);
  }
  
  fermerModale();
  renderListQuestions();
  toast("✓ Question validée dans la console locale.", "ok");
}

function supprimerQuestionFormulaire(index) {
  if (confirm("Supprimer cette question du formulaire local ?")) {
    configDatabase[currentSection].splice(index, 1);
    renderListQuestions();
    toast("🗑️ Question supprimée de la console locale.", "ok");
  }
}

function trierPositionQuestion(index, direction) {
  var list = configDatabase[currentSection];
  var target = index + direction;
  if (target < 0 || target >= list.length) return;
  var temp = list[index];
  list[index] = list[target];
  list[target] = temp;
  renderListQuestions();
}

function sauvegarderConfigurationGlobale() {
  toast("⏳ Écriture sur la base Google Sheets...", "ok");
  
  var fd = new FormData();
  fd.append('action', 'sauvegarderFormulaire');
  fd.append('data', JSON.stringify(configDatabase));
  
  fetch(APPS_SCRIPT_URL, { method: 'POST', body: fd })
  .then(function(r) { return r.json(); })
  .then(function(res) {
    if (res && res.success) {
      toast("🚀 Configuration synchronisée au BE avec succès !", "ok");
    } else {
      toast("❌ Rejet serveur lors de la sauvegarde.", "err");
    }
  }).catch(function(err) {
    console.error(err);
    toast("❌ Erreur de communication réseau.", "err");
  });
}

function toast(msg, type) { var el = document.getElementById('toast'); if(!el) return; document.getElementById('toast-msg').textContent = msg; el.className = 'toast show ' + (type || ''); setTimeout(function(){ el.classList.remove('show'); }, 3500); }
</script>
</body>
</html>
