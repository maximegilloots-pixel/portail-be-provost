<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portail BE — Provost</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
/* 💡 DESIGN DE LA PASTILLE D'AIDE (?) EN ROUGE ET SA BULLE FLASH */
.q-text-tooltip-container { position: relative; margin-left: auto; display: inline-flex; align-items: center; z-index: 15; } 
.q-text-tooltip-icon { width: 20px; height: 20px; background: var(--red-bg); color: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; cursor: help; transition: var(--tr); border: 1px solid rgba(192,57,43,0.15); }
.q-text-tooltip-container:hover .q-text-tooltip-icon { background: var(--red); color: var(--white); box-shadow: 0 2px 8px rgba(192,57,43,0.25); }
.q-text-tooltip-content { position: absolute; bottom: 130%; right: 0; background: var(--white); color: var(--dark); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 16px; box-shadow: var(--shadow-lg); display: none; width: 300px; max-width: 75vw; font-size: 13px; font-weight: 500; font-style: normal; text-transform: none; letter-spacing: normal; line-height: 1.5; white-space: pre-wrap; z-index: 99999; animation: fadeUp 0.2s ease-out; }
.q-text-tooltip-container:hover .q-text-tooltip-content { display: block; }

/* 🚀 BOOST DE L'ESPACEMENT */
.divider { border: none; border-top: 1.5px solid var(--border); margin: 32px 0 20px 0 !important; }

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2d4b8c;--blue-dark:#1a2f5e;--blue-mid:#3a5ca8;
  --blue-light:rgba(45,75,140,0.08);--blue-lighter:rgba(45,75,140,0.04);
  --yellow:#fab423;--yellow-bg:rgba(250,180,35,0.13);
  --dark:#1e2638;--text:#3a4255;--text-light:#8a93a8;
  --border:#e4e8f0;--white:#fff;--bg:#f5f7fb;
  --green:#2a7d52;--green-bg:rgba(42,125,82,0.09);
  --red:#c0392b;--red-bg:rgba(192,57,43,0.09);
  --radius:12px;--radius-sm:8px;
  --shadow:0 4px 20px rgba(35,45,70,0.06);
  --shadow-lg:0 12px 40px rgba(35,45,70,0.12);
  --tr:all 0.25s ease;
}

body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;padding:20px;min-height:100vh}
.tabs{display:flex;gap:4px;background:var(--white);border:1px solid var(--border);border-radius:50px;padding:5px;margin-bottom:25px;width:fit-content;box-shadow:var(--shadow)}
.tab{display:flex;align-items:center;gap:6px;padding:9px 22px;border-radius:40px;border:none;background:transparent;font-family:'Be Vietnam Pro',sans-serif;font-size:12px;font-weight:700;color:var(--text-light);cursor:pointer;transition:var(--tr)}
.tab.active{background:var(--blue);color:var(--white);box-shadow:0 4px 12px rgba(45,75,140,.2)}
.tab:hover:not(.active){background:var(--blue-light);color:var(--blue)}
.section{display:none}.section.active{display:block;animation:fadeUp .3s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.s-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue);display:flex;align-items:center;gap:8px;margin-bottom:6px}
.s-label::before{content:'';width:14px;height:2px;background:var(--yellow);flex-shrink:0}
.s-title{font-size:24px;font-weight:900;color:var(--dark);letter-spacing:-0.5px;margin-bottom:6px;line-height:1.2}
.s-desc{font-size:13px;color:var(--text-light);margin-bottom:22px}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}

/* 🔵 Titres des questions */
.card-title { font-size: 13px; font-weight: 700; color: var(--blue-dark) !important; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: .5px; }
.steps{display:flex;flex-direction:column;gap:12px}
.step{display:flex;gap:14px;padding:16px;background:var(--bg);border-radius:var(--radius);border-left:4px solid var(--blue)}
.step strong{display:block;font-size:13px;color:var(--dark);margin-bottom:2px}
.step span{font-size:12px;color:var(--text-light)}
.wizard{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:22px;box-shadow:var(--shadow)}
.wz{flex:1;padding:12px 8px;text-align:center;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-light);background:var(--white);border-right:1px solid var(--border);transition:var(--tr)}
.wz:last-child{border-right:none}
.wz.active{background:var(--blue);color:var(--white)}
.wz.done{background:var(--green-bg);color:var(--green)}
.wz-n{font-size:14px;font-weight:900;display:block;margin-bottom:2px}
.fstep{display:none}
.fstep.active{display:block}
.frow{margin-bottom:16px}
.flabel{display:block;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--blue);margin-bottom:6px}
.finput,.fselect,.ftextarea{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Be Vietnam Pro',sans-serif;font-size:13px;color:var(--dark);background:var(--white);outline:none;transition:var(--tr)}
.finput:focus,.fselect:focus,.ftextarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(45,75,140,.1)}
.ftextarea{min-height:90px;resize:vertical}
.req{color:var(--red);margin-left:2px}
.produits-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:8px}
.produit-cb{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;background:var(--white);user-select:none;transition:var(--tr)}
.produit-cb.checked{border-color:var(--blue);background:var(--blue-light)}
.cb-box{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.produit-cb.checked .cb-box{background:var(--blue);border-color:var(--blue)}
.cb-check { display: none; color: #ffffff !important; -webkit-text-fill-color: #ffffff !important; text-shadow: 0 0 0 #ffffff; font-size: 14px; font-weight: 900; }
.produit-cb.checked .cb-check{display:block}
.produit-cb span{font-size:12px;font-weight:600;color:var(--dark)}
.q-produit-header{font-size:14px;font-weight:900;color:var(--blue);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:16px;border-bottom:2px solid var(--blue-light);padding-bottom:6px}

/* 🔵 Titres Diagnostic */
.q-title { font-size: 14px; font-weight: 700; color: var(--blue-dark) !important; margin-bottom: 8px; letter-spacing: -0.2px; }
.q-options{display:flex;flex-direction:column;gap:6px}
.q-option{display:flex;align-items:center;gap:10px;padding:9px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text);user-select:none;transition:var(--tr)}
.opt-dot,.opt-sq{width:15px;height:15px;border:2px solid var(--border);flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;transition:var(--tr)}
.opt-dot{border-radius:50%} .opt-sq{border-radius:3px}
.q-option.selected{border-color:var(--green)!important;background:rgba(42,125,82,0.06)!important;color:var(--green)!important;font-weight:700}
.q-option.selected .opt-dot{background:var(--green)!important;border-color:var(--green)!important}
.q-option.selected .opt-dot::after{content:'';width:5px;height:5px;background:var(--white);border-radius:50%;display:block}
.q-option.selected .opt-sq{background:var(--green)!important;border-color:var(--green)!important}
.q-option.selected .opt-sq::after{content:'✓';color:var(--white);font-size:11px;font-weight:900}
.q-text-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Be Vietnam Pro',sans-serif;font-size:13px;color:var(--dark);outline:none;transition:var(--tr)}
.q-text-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(45,75,140,.1)}
.q-text-input.filled, .finput.filled, .fselect.filled, .ftextarea.filled { border-color: var(--green) !important; background: rgba(42, 125, 82, 0.04) !important; }
.dropzone{border:2px dashed var(--blue-mid);border-radius:var(--radius);padding:32px 20px;text-align:center;cursor:pointer;background:var(--blue-lighter);transition:var(--tr)}
.dropzone:hover{background:var(--blue-light);border-color:var(--blue)}
.dz-title{font-size:14px;font-weight:700;color:var(--blue);margin-bottom:4px}
.file-list{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.file-item{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;box-shadow:var(--shadow)}
.file-rm{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text-light);font-size:18px;font-weight:700}
.file-rm:hover{color:var(--red)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:40px;border:none;font-family:'Be Vietnam Pro',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:var(--tr)}
.btn-primary{background:var(--blue);color:var(--white)}
.btn-primary:hover{background:var(--blue-dark);box-shadow:0 4px 14px rgba(45,75,140,.28)}
.btn-yellow{background:var(--yellow);color:var(--dark)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.refresh-btn{display:flex;align-items:center;gap:5px;background:none;border:1.5px solid var(--border);border-radius:40px;padding:5px 13px;font-family:'Be Vietnam Pro',sans-serif;font-size:10px;font-weight:700;color:var(--text-light);cursor:pointer}
.table-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:9px;font-weight:700;text-transform:uppercase}
.b-wait{background:var(--yellow-bg);color:#7a5500}
.b-draft{background:rgba(35,45,70,0.1);color:var(--dark)}
.b-attr{background:var(--green-bg);color:var(--green)}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);background:var(--white)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:rgba(45,75,140,0.04)}
th{padding:12px 16px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-light);border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--dark)}
tbody tr:hover{background:var(--blue-lighter)}
.td-edeal{font-weight:700;color:var(--blue);font-family:monospace;font-size:13px}
.empty-td td{text-align:center;padding:28px;color:var(--text-light);font-style:italic}
.info-box{background:var(--blue-light);border:1.5px solid rgba(45,75,140,.15);border-radius:var(--radius-sm);padding:11px 14px;font-size:11px;color:var(--blue);margin-bottom:14px;display:flex;gap:9px}

.toast{position:fixed;bottom:20px;right:20px;background:var(--dark);color:var(--white);padding:11px 18px;border-radius:var(--radius);font-size:12px;font-weight:500;box-shadow:var(--shadow-lg);z-index:9999;display:flex;align-items:center;gap:9px;transform:translateY(70px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-left:4px solid var(--green)}
.toast.err{border-left:4px solid var(--red)}

.login-screen{position:fixed;inset:0;background:linear-gradient(135deg, #1a2f5e 0%, #2d4b8c 100%);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column}
.login-card{background:var(--white);border-radius:16px;padding:40px;width:400px;box-shadow:var(--shadow-lg);text-align:center;position:relative;overflow:hidden}
.login-logo{font-size:26px;font-weight:900;color:var(--blue);margin-bottom:6px;letter-spacing:-0.5px}
.login-sub{font-size:12px;color:var(--text-light);margin-bottom:30px;font-weight:500}
.login-err{color:var(--red);font-size:12px;margin-top:10px;display:none}
.login-bar{width:100%;height:4px;background:var(--yellow);position:absolute;top:0;left:0}

.app-content{display:none;max-width:1200px;margin:0 auto}
.app-content.visible{display:block}

.loading-overlay{position:fixed;inset:0;width:100vw;height:100vh;background:rgba(255,255,255,0.92);display:none;align-items:center;justify-content:center;z-index:99999;flex-direction:column;font-family:'Be Vietnam Pro',sans-serif}
.progress-bar-container{width:280px;height:6px;background:#e4e8f0;border-radius:10px;overflow:hidden;margin-top:14px}
.progress-bar-fill{width:0%;height:100%;background:var(--blue);animation:fakeLoading 12s cubic-bezier(0.05, 0.85, 0.1, 1) forwards}
@keyframes fakeLoading{0%{width:0%}15%{width:35%}50%{width:68%}80%{width:88%}98%{width:97%}100%{width:99%}}
.btn-filter.active-filter { background: var(--blue) !important; color: #fff !important; font-weight: 700; border-color: var(--blue) !important; }

/* 🖼️ IMAGES TECHNIQUES */
.q-img-wrapper { position: relative; margin: 14px 0; border-radius: var(--radius-sm); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); background: var(--white); max-width: 100%; width: fit-content; display: block; }
.q-img-wrapper:hover { box-shadow: var(--shadow-lg); border-color: var(--blue-mid); }
.q-img-render { display: block; max-width: 100%; max-height: 350px; height: auto; object-fit: contain; -webkit-optimize-contrast; image-rendering: auto; }
.q-scale-container { display: flex; justify-content: space-between; align-items: center; background: var(--bg); padding: 14px 20px; border-radius: var(--radius-sm); border: 1px solid var(--border); margin-top: 8px; }
.q-scale-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
.q-scale-circle { width: 32px; height: 32px; border: 1px solid var(--border); background: var(--white); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--text); transition: var(--tr); }
.q-scale-item.selected .q-scale-circle { background: var(--blue); border-color: var(--blue); color: var(--white); box-shadow: 0 4px 10px rgba(45,75,140,0.25); }

/* 🖼️ INFO-BULLE TECHNIQUE */
.q-tooltip-container { position: relative; margin-left: auto; display: inline-flex; align-items: center; z-index: 10; }
.q-tooltip-icon { font-size: 13px; background: var(--blue-light); color: var(--blue); padding: 3px 8px; border-radius: 4px; font-weight: 600; cursor: help; transition: var(--tr); }
.q-tooltip-container:hover .q-tooltip-icon { background: var(--blue); color: var(--white); }
.q-tooltip-content { position: absolute; bottom: 125%; right: 0; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px; box-shadow: var(--shadow-lg); display: none; max-width: 480px; width: max-content; z-index: 9999; animation: fadeUp 0.2s ease-out; }
.q-tooltip-container:hover .q-tooltip-content { display: block; }
.q-tooltip-img { display: block; max-width: 100%; height: auto; object-fit: contain; border-radius: var(--radius-sm); }

/* ⬆️ BOUTON REMONTER EN HAUT */
#btnRemonter { opacity: 0; visibility: hidden; position: fixed; bottom: 30px; right: 30px; z-index: 99999; background-color: var(--blue); color: var(--white); border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; box-shadow: var(--shadow-lg); transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; pointer-events: none; }
#btnRemonter.show { opacity: 1; visibility: visible; pointer-events: auto; }
#btnRemonter:hover { background-color: var(--blue-dark); transform: translateY(-4px) scale(1.05); box-shadow: 0 8px 25px rgba(45,75,140,0.4); }
#btnRemonter svg { margin-top: 2px; }

/* 🔄 LOGIGRAMME DOCUMENTATION */
.flowchart { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.flow-node { display: flex; align-items: center; gap: 16px; background: var(--white); border: 1.5px solid var(--border); padding: 16px; border-radius: var(--radius); position: relative; box-shadow: var(--shadow); transition: var(--tr); }
.flow-node:hover { border-color: var(--blue-mid); transform: translateX(5px); box-shadow: var(--shadow-lg); }
.flow-icon { font-size: 20px; background: var(--bg); width: 46px; height: 46px; display: flex; justify-content: center; align-items: center; border-radius: 50%; flex-shrink: 0; border: 1.5px solid var(--border); }
.flow-text h4 { font-size: 13px; color: var(--blue-dark); margin-bottom: 4px; font-weight: 700; }
.flow-text p { font-size: 12px; color: var(--text); line-height: 1.5; margin: 0; }
.flow-arrow { text-align: center; color: var(--blue-mid); font-size: 20px; margin: 2px 0; font-weight: 900; }
.flow-status { position: absolute; right: 16px; top: 16px; }

/* GRILLE DES FONCTIONNALITÉS */
.features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
.feature-box { background: var(--blue-lighter); border: 1px solid rgba(45,75,140,0.1); padding: 16px; border-radius: var(--radius); transition: var(--tr); }
.feature-box:hover { background: var(--white); border-color: var(--blue); box-shadow: var(--shadow); }
.feature-box h4 { font-size: 13px; color: var(--blue-dark); margin-bottom: 8px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.feature-box p { font-size: 12px; color: var(--text); line-height: 1.5; margin: 0; }

/* 🎓 TUTO ONBOARDING */
.tuto-overlay { position: fixed; inset: 0; background: rgba(30, 38, 56, 0.85); display: none; align-items: center; justify-content: center; z
